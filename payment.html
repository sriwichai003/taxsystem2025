<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ช่องทางการชำระเงิน - เทศบาลนครเชียงใหม่</title>
</head>
<body>
  <main class="container">


    <div class="payment-page-container">
      <div class="payment-card">
        <div class="payment-header">
          <div class="bank-logo-wrapper">
            <img src="https://upload.wikimedia.org/wikipedia/th/thumb/f/f3/Krung_Thai_Bank_logo.svg/1024px-Krung_Thai_Bank_logo.svg.png" 
                 alt="KTB Logo" 
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <i class="fas fa-university" style="display:none; font-size: 32px; color: #0284c7;"></i>
          </div>
          <h2 class="bank-title">ธนาคารกรุงไทย</h2>
          <p class="account-type">บัญชีกระแสรายวัน</p>
        </div>

        <div class="payment-body">
          <div class="info-group">
            <div class="info-label">ชื่อบัญชี</div>
            <div class="account-name">เทศบาลนครเชียงใหม่</div>
          </div>

          <div class="info-group">
            <div class="info-label">เลขบัญชีธนาคาร</div>
            <div class="account-number-box">
              <span class="account-number">520-6-03825-3</span>
              <button class="btn-copy" onclick="
                const btn = this;
                navigator.clipboard.writeText('5206038253').then(function() {
                  const originalHTML = btn.innerHTML;
                  btn.innerHTML = '<i class=\'fas fa-check\'></i> คัดลอกแล้ว';
                  btn.style.background = '#10b981';
                  btn.style.color = '#ffffff';
                  setTimeout(function() {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '';
                    btn.style.color = '';
                  }, 2000);
                  const toast = document.getElementById('toastMessage');
                  toast.classList.add('show');
                  setTimeout(function() {
                    toast.classList.remove('show');
                  }, 3000);
                }).catch(function(e) {
                  alert('ไม่สามารถคัดลอกได้ กรุณาทำรายการด้วยตนเอง');
                });
              ">
                <i class="far fa-copy"></i> คัดลอก
              </button>
            </div>
          </div>

          <div class="divider">หรือ</div>

          <div class="qr-wrapper">
            <div class="qr-box">
              <img src="assets/images/5206038253.jpg" alt="QR Code" class="qr-image">
            </div>
            <p class="qr-note">
              <i class="fas fa-qrcode" style="color: #0ea5e9;"></i> สแกนเพื่อชำระเงิน
            </p>
          </div>
        </div>
      </div>

      <div style="text-align: center;">
        <a href="#home" class="k-back-btn">
          <i class="fas fa-arrow-left"></i> ย้อนกลับไปหน้าหลัก
        </a>
      </div>

    </div>
    <div id="toastMessage" class="toast-notification">
      <i class="fas fa-check-circle"></i> คัดลอกเลขบัญชีเรียบร้อยแล้ว
    </div>

  </main>
</body>
</html>
