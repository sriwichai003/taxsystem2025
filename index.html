<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบงานจัดเก็บรายได้ศรีวิชัย</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo-area">
        <span style="background: #e7f1ff; padding: 8px; border-radius: 12px"
          ><i
            class="fas fa-landmark"
            style="color: #0d6efd; font-size: 24px"
          ></i
        ></span>
        <div>
          <h1>ระบบงานจัดเก็บรายได้ศรีวิชัย</h1>
          <p style="margin: 0; font-size: 13px; color: #6c757d">
            เทศบาลนครเชียงใหม่
          </p>
        </div>
      </div>
      <nav class="main-nav-mobile">
        <ul id="menuList">
          <li class="nav-item active">
            <a href="#home"><i class="fas fa-newspaper"></i> หน้าแรก</a>
          </li>
          <li class="nav-item">
            <a href="#signTax"><i class="fas fa-sign"></i> ภาษีป้าย</a>
          </li>
          <li class="nav-item">
            <a href="#landTax"><i class="fas fa-map-marked-alt"></i> ภาษีที่ดิน</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <div id="content-area">กำลังโหลดข้อมูล...</div>
    </main>

    <footer>
      <div class="footer-content">
        <div class="copyright">
          © 2025 งานจัดเก็บรายได้ศรีวิชัย เทศบาลนครเชียงใหม่
        </div>

        <div class="visitor-stats">
          <i class="fas fa-users"></i>
          <span>จำนวนผู้เข้าชมเว็บไซต์วันนี้:</span>
          <span class="visitor-count" id="visitorCount"></span>
          <span>คน</span>
        </div>
      </div>
    </footer>

    <!-- Announcement Modal -->
    <div id="announcementModal" class="modal-overlay">
      <div class="modal-content">
        <button id="closeModalBtn" class="modal-close"><i class="fas fa-times"></i></button>
        <img id="announcementImg" src="assets/images/image_cms_fjklmnqrstv2.jpg" alt="ประกาศแจ้งเตือน" />
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
